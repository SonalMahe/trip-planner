    const CITY_KEYS = Object.keys(CITIES);

    function sortPlaces(places) {
      return [...places].sort((a, b) => a.price - b.price);
    }

    const fmtPrice = (p) => (p === 0 ? "Free" : `€${p % 1 === 0 ? p : p.toFixed(2)}`);

    /* ----------------------------- APP ----------------------------- */

    function TripPlanner() {
      const [view, setView] = useState("home");
      const [skipped, setSkipped] = useState({});
      const [visited, setVisited] = useState({});
      const [openSection, setOpenSection] = useState({});
      const [loaded, setLoaded] = useState(false);

      useEffect(() => {
        const sk = {};
        const vi = {};
        for (const key of CITY_KEYS) {
          try {
            const val = localStorage.getItem(`skipped:${key}`);
            sk[key] = new Set(val ? JSON.parse(val) : []);
          } catch { sk[key] = new Set(); }
          try {
            const val = localStorage.getItem(`visited:${key}`);
            vi[key] = new Set(val ? JSON.parse(val) : []);
          } catch { vi[key] = new Set(); }
        }
        setSkipped(sk);
        setVisited(vi);
        setLoaded(true);
      }, []);

      const persist = useCallback((kind, cityKey, set) => {
        try { localStorage.setItem(`${kind}:${cityKey}`, JSON.stringify([...set])); } catch {}
      }, []);

      const toggleSkip = (cityKey, placeId) => {
        setSkipped((prev) => {
          const next = { ...prev };
          const s = new Set(next[cityKey] || []);
          if (s.has(placeId)) s.delete(placeId); else s.add(placeId);
          next[cityKey] = s;
          persist("skipped", cityKey, s);
          return next;
        });
      };

      const toggleVisited = (cityKey, placeId) => {
        setVisited((prev) => {
          const next = { ...prev };
          const s = new Set(next[cityKey] || []);
          if (s.has(placeId)) s.delete(placeId); else s.add(placeId);
          next[cityKey] = s;
          persist("visited", cityKey, s);
          return next;
        });
      };

      const restoreAll = (cityKey) => {
        setSkipped((prev) => {
          const next = { ...prev, [cityKey]: new Set() };
          persist("skipped", cityKey, next[cityKey]);
          return next;
        });
      };

      const toggleSection = (cityKey, section) => {
        setOpenSection((prev) => ({
          ...prev,
          [cityKey]: { ...prev[cityKey], [section]: !prev[cityKey]?.[section] },
        }));
      };

      const cityCost = (cityKey) => {
        const sk = skipped[cityKey] || new Set();
        return CITIES[cityKey].places
          .filter((p) => p.price > 0 && !sk.has(p.id))
          .reduce((sum, p) => sum + p.price, 0);
      };

      const cityCounts = (cityKey) => {
        const sk = skipped[cityKey] || new Set();
        const remaining = CITIES[cityKey].places.filter((p) => !sk.has(p.id));
        return {
          free: remaining.filter((p) => p.price === 0).length,
          paid: remaining.filter((p) => p.price > 0).length,
        };
      };

      const tripTotal = CITY_KEYS.reduce((sum, k) => sum + cityCost(k), 0);

      if (!loaded) {
        return (
          <div className="min-h-screen bg-slate-100 flex items-center justify-center">
            <p className="text-slate-500 font-mono text-sm">loading route…</p>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-100 text-slate-900">
          <div className="max-w-md mx-auto px-4 pb-16">
            {view === "home" ? (
              <HomeScreen
                onSelect={setView}
                tripTotal={tripTotal}
                cityCost={cityCost}
                cityCounts={cityCounts}
              />
            ) : (
              <CityScreen
                cityKey={view}
                onBack={() => setView("home")}
                skipped={skipped[view] || new Set()}
                visited={visited[view] || new Set()}
                onToggleSkip={(id) => toggleSkip(view, id)}
                onToggleVisited={(id) => toggleVisited(view, id)}
                onRestoreAll={() => restoreAll(view)}
                cost={cityCost(view)}
                openSection={openSection[view] || {}}
                onToggleSection={(s) => toggleSection(view, s)}
              />
            )}
          </div>
        </div>
      );
    }

    /* ----------------------------- HOME ----------------------------- */

    function HomeScreen({ onSelect, tripTotal, cityCost, cityCounts }) {
      return (
        <div className="pt-8">
          <h1 className="font-display text-3xl font-bold tracking-tight">Route Planner</h1>
          <p className="font-mono text-xs text-slate-500 mt-1 mb-6">
            Belgium &amp; Luxembourg · June 2026
          </p>

          <div className="flex items-center gap-2 mb-6 px-3 py-2 rounded-md bg-white border border-slate-200">
            <Wallet size={16} className="text-amber-700 shrink-0" />
            <span className="font-body text-sm text-slate-500">Planned spend across all stops</span>
            <span className="font-mono text-sm font-medium ml-auto">€{tripTotal.toFixed(2)}</span>
          </div>

          <div className="space-y-3">
            {CITY_KEYS.map((key) => {
              const { free, paid } = cityCounts(key);
              const cost = cityCost(key);
              return (
                <button
                  key={key}
                  onClick={() => onSelect(key)}
                  className="w-full text-left bg-white border border-slate-200 rounded-lg px-4 py-3 hover:border-emerald-600/50 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-500"
                >
                  <div className="flex items-center justify-between mb-2">
                    <span className="font-display text-lg font-bold">{CITIES[key].name}</span>
                    <span className="font-mono text-sm text-amber-700">€{cost.toFixed(2)}</span>
                  </div>
                  <div className="flex items-center gap-3 font-mono text-xs text-slate-500">
                    <span className="flex items-center gap-1.5">
                      <span className="inline-block w-2.5 h-2.5 rounded-full border-2 border-emerald-600" />
                      {free} free
                    </span>
                    <span className="flex items-center gap-1.5">
                      <span className="inline-block w-2.5 h-2.5 rounded-full bg-amber-600" />
                      {paid} paid
                    </span>
                  </div>
                </button>
              );
            })}
          </div>

          <p className="font-body text-xs text-slate-500 mt-6 text-center">
            Tap a city to see the route. Skip places you don't want — your choices are saved.
          </p>
        </div>
      );
    }

    /* ----------------------------- CITY SCREEN ----------------------------- */

    function CityScreen({
      cityKey, onBack, skipped, visited,
      onToggleSkip, onToggleVisited, onRestoreAll,
      cost, openSection, onToggleSection,
    }) {
      const city = CITIES[cityKey];
      const allPlaces = sortPlaces(city.places);
      const activePlaces = allPlaces.filter((p) => !skipped.has(p.id));
      const skippedPlaces = allPlaces.filter((p) => skipped.has(p.id));

      return (
        <div className="pt-6">
          <button
            onClick={onBack}
            className="flex items-center gap-1 text-slate-500 hover:text-slate-900 font-body text-sm mb-3 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-500 rounded"
          >
            <ChevronLeft size={16} /> All cities
          </button>

          <h1 className="font-display text-2xl font-bold mb-4">{city.name}</h1>

          <CollapsibleSection
            title="Trip notes"
            icon={<MapPin size={14} className="text-red-600" />}
            open={!!openSection.notes}
            onToggle={() => onToggleSection("notes")}
          >
            <div className="space-y-2 font-body text-sm text-slate-700">
              <p>
                <span className="font-mono text-xs text-slate-500 block mb-0.5">PARKING</span>
                {city.parking}
              </p>
              <p>
                <span className="font-mono text-xs text-slate-500 block mb-0.5">SUGGESTED ROUTE</span>
                {city.itinerary}
              </p>
            </div>
          </CollapsibleSection>

          <div className="flex items-center gap-2 my-4 px-3 py-2 rounded-md bg-white border border-slate-200">
            <Wallet size={16} className="text-amber-700 shrink-0" />
            <span className="font-body text-sm text-slate-500">Estimated cost (kept stops)</span>
            <span className="font-mono text-sm font-medium ml-auto">€{cost.toFixed(2)}</span>
          </div>

          <div className="mt-2">
            {activePlaces.length === 0 ? (
              <p className="font-body text-sm text-slate-500 italic py-4 text-center">
                All stops skipped. Restore some below to plan your route.
              </p>
            ) : (
              activePlaces.map((place, idx) => (
                <PlaceNode
                  key={place.id}
                  place={place}
                  cityName={city.name}
                  isLast={idx === activePlaces.length - 1}
                  isVisited={visited.has(place.id)}
                  onToggleVisited={() => onToggleVisited(place.id)}
                  onSkip={() => onToggleSkip(place.id)}
                />
              ))
            )}
          </div>

          {skippedPlaces.length > 0 && (
            <CollapsibleSection
              title={`Skipped (${skippedPlaces.length})`}
              icon={<XIcon size={14} className="text-slate-500" />}
              open={!!openSection.skipped}
              onToggle={() => onToggleSection("skipped")}
              extra={
                <button
                  onClick={onRestoreAll}
                  className="font-mono text-xs text-emerald-700 hover:underline focus:outline-none"
                >
                  restore all
                </button>
              }
            >
              <div className="space-y-2">
                {skippedPlaces.map((p) => (
                  <div key={p.id} className="flex items-center justify-between gap-2 py-1.5 px-2 rounded bg-slate-100">
                    <div className="min-w-0">
                      <p className="font-body text-sm text-slate-500 truncate">{p.name}</p>
                      <p className="font-mono text-xs text-slate-400">{fmtPrice(p.price)} · {p.time}</p>
                    </div>
                    <button
                      onClick={() => onToggleSkip(p.id)}
                      aria-label={`Add ${p.name} back to route`}
                      className="shrink-0 p-1.5 rounded-full border border-slate-200 text-emerald-700 hover:bg-slate-300 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-500"
                    >
                      <RotateCcw size={14} />
                    </button>
                  </div>
                ))}
              </div>
            </CollapsibleSection>
          )}
        </div>
      );
    }

    /* ----------------------------- PLACE NODE ----------------------------- */

    function PlaceNode({ place, cityName, isLast, isVisited, onToggleVisited, onSkip }) {
      const [expanded, setExpanded] = useState(false);
      const isFree = place.price === 0;
      const mapsUrl =
        "https://www.google.com/maps/search/?api=1&query=" +
        encodeURIComponent(`${place.name}, ${cityName}`);

      return (
        <div className="relative pl-9">
          {!isLast && (
            <div className="absolute left-[7px] top-5 bottom-[-4px] w-px bg-slate-300" aria-hidden="true" />
          )}
          <div
            className={`absolute left-0 top-1.5 w-4 h-4 rounded-full border-2 ${
              isFree ? "border-emerald-600 bg-transparent" : "border-amber-600 bg-amber-600"
            }`}
            aria-hidden="true"
          />
          <div className={`mb-3 rounded-lg border transition-opacity ${
            isVisited ? "opacity-60 border-slate-200 bg-slate-100" : "border-slate-200 bg-white"
          }`}>
            <button
              onClick={() => setExpanded((v) => !v)}
              aria-expanded={expanded}
              className="w-full text-left px-3 py-2.5 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-500 rounded-lg"
            >
              <div className="flex items-start justify-between gap-2">
                <h3 className="font-body font-medium text-sm leading-snug text-slate-900">{place.name}</h3>
                <span className={`font-mono text-xs shrink-0 ${isFree ? "text-emerald-700" : "text-amber-700"}`}>
                  {fmtPrice(place.price)}
                </span>
              </div>
              <div className="flex items-center justify-between mt-0.5">
                <p className="font-mono text-xs text-slate-500">{place.time}</p>
                <span className="flex items-center gap-1 font-mono text-[11px] text-slate-400">
                  {isVisited && <Check size={11} className="text-emerald-600" />}
                  {expanded ? <ChevronUp size={14} /> : <ChevronDown size={14} />}
                </span>
              </div>
            </button>

            {expanded && (
              <div className="px-3 pb-3 pt-1 border-t border-slate-100">
                <p className="font-body text-sm text-slate-700 leading-relaxed mb-3">{place.desc}</p>
                <a
                  href={mapsUrl}
                  target="_blank"
                  rel="noopener noreferrer"
                  className="flex items-center justify-center gap-1.5 w-full font-mono text-xs px-2 py-2 rounded border border-slate-300 text-slate-700 hover:bg-slate-100 hover:border-slate-400 mb-2 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-500"
                >
                  <MapPin size={13} className="text-red-600" /> Open in Google Maps
                  <ExternalLink size={11} className="text-slate-400" />
                </a>
                <div className="flex items-center gap-2">
                  <button
                    onClick={onToggleVisited}
                    aria-pressed={isVisited}
                    className={`flex items-center gap-1 font-mono text-xs px-2 py-1 rounded border focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-500 ${
                      isVisited
                        ? "border-emerald-600 text-emerald-700 bg-emerald-50"
                        : "border-slate-200 text-slate-500 hover:border-emerald-600/50"
                    }`}
                  >
                    <Check size={12} /> {isVisited ? "Done" : "Mark done"}
                  </button>
                  <button
                    onClick={onSkip}
                    className="flex items-center gap-1 font-mono text-xs px-2 py-1 rounded border border-slate-200 text-slate-500 hover:border-red-400 hover:text-red-600 ml-auto focus:outline-none focus-visible:ring-2 focus-visible:ring-red-500"
                  >
                    <XIcon size={12} /> Skip
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ----------------------------- COLLAPSIBLE ----------------------------- */

    function CollapsibleSection({ title, icon, open, onToggle, extra, children }) {
      return (
        <div className="border border-slate-200 rounded-lg overflow-hidden mb-3">
          <button
            onClick={onToggle}
            className="w-full flex items-center gap-2 px-3 py-2.5 bg-white focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-500 focus-visible:ring-inset"
          >
            {icon}
            <span className="font-mono text-xs uppercase tracking-wide text-slate-700">{title}</span>
            <span className="ml-auto flex items-center gap-2">
              {extra}
              {open ? <ChevronUp size={14} className="text-slate-500" /> : <ChevronDown size={14} className="text-slate-500" />}
            </span>
          </button>
          {open && <div className="px-3 py-3 bg-slate-50">{children}</div>}
        </div>
      );
    }

    /* ----------------------------- MOUNT ----------------------------- */

    ReactDOM.createRoot(document.getElementById('root')).render(<TripPlanner />);
  </script>
</body>
</html>
